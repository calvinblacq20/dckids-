# Render Blueprint: one Express/SQLite instance with one persistent disk.
# Dashboard-only secrets remain sync:false and are never committed.
services:
  - type: web
    name: dckids-brand
    runtime: node
    plan: starter
    branch: main
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node server.js
    healthCheckPath: /readyz
    autoDeploy: true
    numInstances: 1
    disk:
      name: dckids-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
